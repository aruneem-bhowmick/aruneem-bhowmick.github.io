<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Aruneem Bhowmick" />
    <meta
      name="description"
      content="Aruneem Bhowmick works on reasoning architectures, representation learning, and mechanistic interpretability."
    />
    <meta name="robots" content="index,follow" />
    <meta name="google-site-verification" content="pAgsoqMZZBCO5aOhuCU7RFDe_T78Pmif4rFwswkdOrc" />
    <title>Aruneem Bhowmick</title>
  </head>
  <body>
    <script>
      document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark')
    </script>
    <script>
      // Browsers only evaluate the favicon SVG's prefers-color-scheme CSS on fetch,
      // so force a re-fetch when the OS theme flips to swap it instantly.
      window
        .matchMedia('(prefers-color-scheme: dark)')
        .addEventListener('change', () => {
          document.querySelector('link[rel="icon"]').href = `/favicon.svg?${Date.now()}`
        })
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
